<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <section class="checkout-container">
    <h1>Your Order</h1>

    <!-- Cart items -->
    <div id="checkoutItems"></div>

    <!-- Total -->
    <h3 id="checkoutTotal"></h3>

    <!-- PayPal button -->
    <div id="paypal-button-container"></div>

  <!-- PayPal SDK -->

  <!-- Your checkout logic -->
  <script src="checkout.js"></script>

</body>
</html>
