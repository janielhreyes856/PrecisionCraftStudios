<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout – Precision Craft Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>

<style>
  :root {
    --mint: #8ECAAE;
    --mint-light: #C8E8D9;
    --mint-pale: #EDF7F2;
    --mint-deep: #5FAD8A;
    --white: #FFFFFF;
    --off-white: #F8FCFA;
    --black: #111111;
    --black-soft: #222222;
    --gray: #888888;
    --gray-light: #E8E8E8;
    --font-display: 'Cormorant Garamond', serif;
    --font-ui: 'Jost', sans-serif;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
  }

  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--white);
    color: var(--black-soft);
  }

  /* ─── NAVBAR (MATCH YOUR SITE EXACTLY) ─── */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 72px;
    background: var(--white);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo-img {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    object-fit: cover;
  }

  .nav-brand {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--black);
    display: flex;
    flex-direction: column;
    line-height: 1.05;
  }

  .nav-brand span {
    font-size: 0.65rem;
    font-family: var(--font-ui);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray);
  }

  /* ─── CHECKOUT WRAPPER ─── */
  .checkout-container {
    max-width: 750px;
    margin: 140px auto 80px;
    padding: 40px;
    border: 1px solid rgba(142, 202, 174, 0.25);
    border-radius: 18px;
    background: var(--off-white);
    box-shadow: var(--shadow);
    text-align: center;
  }

  .checkout-title {
    font-family: var(--font-display);
    font-size: 2rem;
    margin-bottom: 30px;
    color: var(--mint-deep);
  }

  #checkoutItems {
    text-align: left;
    margin-bottom: 20px;
  }

  #checkoutItems div {
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-light);
  }

  #checkoutTotal {
    margin-top: 20px;
    font-size: 1.2rem;
    color: var(--mint-deep);
  }

  #paypal-button-container {
    margin-top: 30px;
  }
</style>
</head>

<body>

<!-- ─── NAVBAR (CENTERED BRAND ONLY) ─── -->
<nav>
  <a href="/" class="nav-logo">
    <img src="https://i.imgur.com/v8Omcnw.png" alt="Precision Craft Studios Logo" class="nav-logo-img">
    <div class="nav-brand">
      Precision Craft Studios
      <span>Crafting What Brings Joy</span>
    </div>
  </a>
</nav>

<!-- ─── CHECKOUT CONTENT ─── -->
<section class="checkout-container">

  <div class="checkout-title">Your Order</div>

  <!-- CART ITEMS -->
  <div id="checkoutItems"></div>

  <!-- TOTAL -->
  <h3 id="checkoutTotal"></h3>

  <!-- PAYPAL -->
  <div id="paypal-button-container"></div>

</section>

<!-- ─── YOUR JS ─── -->
<script src="checkout.js"></script>

</body>
</html>
